# docker-compose.yml - GHCR 이미지 + .env 주입 (외부 MySQL 사용)
# 실행: docker compose -f docker/docker-compose.yml up -d
# ponytail: DB는 .env의 외부 호스트를 씀 → DB 컨테이너 불필요. 로컬 DB가 필요하면 git history 참조.
services:
  app:
    image: ghcr.io/teinam/lotto:latest
    container_name: lotto-telegram-bot
    restart: unless-stopped
    pull_policy: always
    ports:
      - "8000:8000"
    env_file:
      - ../.env
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
